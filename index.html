<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的 AI 真人語音助手</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: var(--primary); margin: 0 0 10px 0; text-align: center; font-size: 22px; }
        input[type="password"] { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        textarea { width: 100%; height: 250px; padding: 15px; border: 1px solid #eee; border-radius: 12px; resize: none; box-sizing: border-box; font-size: 16px; line-height: 1.6; background: #fafafa; }
        .hint { font-size: 11px; color: #aaa; margin-bottom: 15px; text-align: center; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.97); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 15px; text-align: center; font-size: 14px; color: #666; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <h2>Gemini 語音讀報</h2>
    <input type="password" id="apiKey" placeholder="在此輸入 Gemini API Key">
    <div class="hint">金鑰僅存於您的手機，安全性高</div>

    <textarea id="inputText" placeholder="在此貼上文章內容..."></textarea>
    
    <button id="playBtn" onclick="startProcess()">立即播放自然語音</button>
    <div id="status">準備就緒</div>
</div>

<script>
    const statusDiv = document.getElementById('status');
    const playBtn = document.getElementById('playBtn');

    // 頁面載入時自動讀取 Key
    window.onload = () => {
        const savedKey = localStorage.getItem('gemini_key');
        if (savedKey) document.getElementById('apiKey').value = savedKey;
        // 預熱語音引擎
        window.speechSynthesis.getVoices();
    };

        const apiKey = document.getElementById('apiKey').value;
        const text = document.getElementById('inputText').value;
